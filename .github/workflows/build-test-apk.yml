name: 📱 Build Emulation APK (Test Runner)

on:
  workflow_dispatch:
  push:
    paths:
      - 'test-runner/**'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Test Runner (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Build APK via Gradle
        working-directory: ./test-runner
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
          
          mv app/build/outputs/apk/debug/app-debug.apk "../kivy-test-runner-cp311-arm64-v8a.apk"

      - name: 🚀 Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "test-runners"
          name: "Test Runner APKs (QA)"
          body: "Internal Guardian APK containing Core arm64-v8a (Py3.11) for E2E validation of Wheels in CI."
          files: kivy-test-runner-cp311-arm64-v8a.apk
          make_latest: false